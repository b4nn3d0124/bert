<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contact - BorrowSmart</title>
<link rel="icon" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
  <rect width='100' height='100' rx='22' fill='%23ff4fa3'/>
  <circle cx='40' cy='50' r='14' fill='white'/>
  <circle cx='40' cy='50' r='6' fill='%23ff4fa3'/>
  <rect x='50' y='46' width='28' height='8' rx='3' fill='white'/>
  <rect x='62' y='54' width='6' height='10' fill='white'/>
  <rect x='70' y='54' width='6' height='6' fill='white'/>
</svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="config.js"></script>
</head>
<body>
<div class="bg-layer">
  <div class="bg-gradient"></div>
  <div class="bg-grid"></div>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
</div>

<header class="header">
  <a href="index.html" class="logo">
    <div class="logo-icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25a3 3 0 013 3m3 0a6 6 0 01-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1121.75 8.25z" />
      </svg>
    </div>
    BorrowSmart
  </a>
  <button class="mobile-menu-btn" aria-label="Toggle menu">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
    </svg>
  </button>
  <nav class="nav-links">
    <a href="index.html">Home</a>
    <a href="contact.html" class="active">Message</a>
    <a href="about.html">About</a>
    <a href="admin.html" class="nav-admin">Admin</a>
  </nav>
</header>

<div class="mobile-nav">
  <a href="index.html">Home</a>
  <a href="contact.html" class="active">Message</a>
  <a href="about.html">About</a>
  <a href="admin.html">Admin</a>
</div>

<div class="container" style="max-width: 680px;">
  <div class="page-hero">
    <h1>Send a Message</h1>
    <p>Have a question or concern? Send a message directly to our admin team.</p>
  </div>

  <div class="section">
    <div class="card animate-in">
      <div class="form-group">
        <label>Your Name</label>
        <input type="text" id="senderName" placeholder="Enter your name" required>
      </div>
      <div class="form-group">
        <label>Message</label>
        <textarea id="messageBody" rows="5" placeholder="Write your message here..."
          style="width:100%; padding:12px 16px; background:rgba(0,0,0,0.2); border:1px solid var(--border);
                 border-radius:10px; color:var(--fg); font-family:'Inter',sans-serif; font-size:14px;
                 resize:vertical; min-height:120px; outline:none; transition:border-color 0.2s;"
          onfocus="this.style.borderColor='var(--accent)'"
          onblur="this.style.borderColor='var(--border)'"></textarea>
      </div>
      <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-top:8px;">
        <button class="btn-primary" onclick="sendContactMessage()" id="sendBtn">Send Message</button>
        <span id="sendStatus" style="font-size:14px;"></span>
      </div>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const mobileMenuBtn = document.querySelector('.mobile-menu-btn');
  const mobileNav     = document.querySelector('.mobile-nav');
  if (mobileMenuBtn && mobileNav) {
    mobileMenuBtn.addEventListener('click', function() {
      mobileNav.classList.toggle('active');
      document.body.classList.toggle('menu-open');
    });
    document.querySelectorAll('.mobile-nav a').forEach(link => {
      link.addEventListener('click', () => {
        mobileNav.classList.remove('active');
        document.body.classList.remove('menu-open');
      });
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        mobileNav.classList.remove('active');
        document.body.classList.remove('menu-open');
      }
    });
  }

  // Animate cards on scroll
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('animate-in');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1 });
  document.querySelectorAll('.card').forEach(el => observer.observe(el));
});

async function sendContactMessage() {
  const name    = document.getElementById('senderName').value.trim();
  const message = document.getElementById('messageBody').value.trim();
  const status  = document.getElementById('sendStatus');
  const btn     = document.getElementById('sendBtn');

  if (!name) { status.style.color = 'var(--danger)'; status.textContent = 'Please enter your name.'; return; }
  if (!message) { status.style.color = 'var(--danger)'; status.textContent = 'Please enter a message.'; return; }

  btn.disabled = true;
  status.style.color = 'var(--fg-muted)';
  status.textContent = 'Sending…';

  try {
    const params = new URLSearchParams({
      action: 'submitMessage',
      name: name,
      message: message
    });

    const res  = await fetch(CONFIG.ADMIN_API_URL + '?' + params.toString());
    const data = await res.json();

    if (data.success) {
      status.style.color = '#10b981';
      status.textContent = '✓ Message sent successfully!';
      document.getElementById('senderName').value  = '';
      document.getElementById('messageBody').value = '';
    } else {
      status.style.color = 'var(--danger)';
      status.textContent = data.error || 'Failed to send message.';
    }
  } catch (err) {
    console.error(err);
    status.style.color = 'var(--danger)';
    status.textContent = 'Network error. Please try again.';
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
